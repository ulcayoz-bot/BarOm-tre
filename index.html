  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f7f5f2;color:#1e1e2e;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    html{background:#f7f5f2}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#0d7a6e33;border-radius:4px}
    input,select,button,textarea{-webkit-tap-highlight-color:transparent;font-family:'DM Sans',system-ui,sans-serif}
    select option{background:#fff;color:#1e1e2e}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#0d7a6e88!important;box-shadow:0 0 0 3px #0d7a6e14!important}
    #splash{position:fixed;inset:0;background:linear-gradient(160deg,#f7f5f2 0%,#eef7f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash-i{font-size:64px;margin-bottom:16px;animation:bob 2s ease-in-out infinite;filter:drop-shadow(0 8px 24px #0d7a6e30)}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    #splash-t{font-size:38px;font-weight:800;color:#0d7a6e;font-family:'Fraunces',serif;letter-spacing:-1px}
    #splash-s{color:#8b8599;font-size:14px;margin-top:8px;max-width:280px;text-align:center;line-height:1.5}
    button:active{opacity:0.88;transform:scale(0.97)}
    input[type=number]::-webkit-inner-spin-button{opacity:1;height:32px}
  </style>
</head>

<input type="file" id="fi-gallery" accept="image/*" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0">
<input type="file" id="fi-json" accept=".json" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0">
<input type="file" id="fi-doc" accept=".pdf,.xlsx,.xls,.csv" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0">
