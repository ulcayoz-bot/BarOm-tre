  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F7F4EF;color:#1C1917;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    html{background:#F7F4EF}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#0D948833;border-radius:4px}
    input,select,button,textarea{-webkit-tap-highlight-color:transparent;font-family:'DM Sans',system-ui,sans-serif}
    select option{background:#fff;color:#1e1e2e}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#0d7a6e88!important;box-shadow:0 0 0 3px #0d7a6e14!important}
    #splash{position:fixed;inset:0;background:linear-gradient(160deg,#F7F4EF 0%,#E8F7F5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash-i{font-size:64px;margin-bottom:16px;animation:bob 2s ease-in-out infinite;filter:drop-shadow(0 8px 24px #0d7a6e30)}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    #splash-t{font-size:38px;font-weight:700;color:#0D9488;font-family:'DM Serif Display',Georgia,serif;letter-spacing:-0.5px}
    #splash-s{color:#8b8599;font-size:14px;margin-top:8px;max-width:280px;text-align:center;line-height:1.5}
    button:active{opacity:0.88;transform:scale(0.97)}
    input[type=number]::-webkit-inner-spin-button{opacity:1;height:32px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .fade-in{animation:fadeIn .2s ease-out}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>

// Reset stock to new version if needed
(function(){
  try {
    var v = localStorage.getItem('bl2_stock_version');
    if (!v || parseInt(v) < 2) {
      localStorage.removeItem('bl2_stock');
      localStorage.removeItem('bl2_cats');
      localStorage.setItem('bl2_stock_version', '2');
      console.log('BarOmetre: stock réinitialisé avec la nouvelle liste (203 produits)');
    }
  } catch(e) {}
})();
